<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Lista de Libros</title>
</head>
<body>
  <div class="cabecera">
    <button class="crearbtn" title="Crear" (click)="crearLibro()">Añadir Libro</button>

    <!-- filtro -->
    <div class="buscar-frame">
       <input type="number" [(ngModel)]="id" placeholder="Filtrar por id..."/>
       <button class="buscarbtn" title="Buscar" (click)="verLibrosId()">
        <i class="bi bi-search"></i>
      </button>
    </div>

  </div>

  <div *ngIf="listaLibros && listaLibros.length > 0"> <!-- Comprueba que llega informacion -->
    <ul class="libro-lista">
      <li class="libro-header">
        <span>Título</span>
        <span>ID</span>
        <span>Autor</span>
        <span>Año</span>
        <span>Acciones</span>
      </li>

      <li class="libro-item" *ngFor="let libro of listaLibros"> <!--  Muestra los libros -->
        <span>{{ libro.titulo }}</span>
        <span>{{ libro.id }}</span>
        <span>{{ libro.autor }}</span>
        <span>{{ libro.anioPublicacion }}</span>
        <span class="acciones">
          <button class="editarbtn" title="Editar" (click)="actualizarLibro()">
            <i class="bi bi-vector-pen"></i>
          </button>
          <button class="eliminarbtn" title="Eliminar" (click)="eliminarLibro()">
            <i class="bi bi-trash"></i>
          </button>
        </span>
      </li>
    </ul>
  </div>
</body>
</html>
